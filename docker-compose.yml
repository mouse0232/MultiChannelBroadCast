version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-channel-broadcast:latest
    container_name: multi-channel-broadcast
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
