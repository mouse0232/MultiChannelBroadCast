name = "mcb-crawler"
compatibility_date = "2024-05-01"
main = "workers/cache-worker.js"
compatibility_flags = [ "nodejs_compat" ]

# Observability 配置 - 保持开启状态
[observability]
enabled = true

  [observability.logs]
  head_sampling_rate = 1

  [observability.traces]
  enabled = true
  head_sampling_rate = 0.01

# 1. 绑定 D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "multi-channel-db"
database_id = "70ca97b0-ef88-4893-abaf-dffa4d2e4d86"

# 2. 绑定 KV 命名空间
[[kv_namespaces]]
binding = "CHANNEL_CACHE"
id = "a6d1d728072648e3859d380f506e86a0"

# 3. 绑定 Queue (生产者：负责发任务)
[[queues.producers]]
queue = "scraping-tasks"
binding = "TASK_QUEUE"

# 4. 绑定 Queue (消费者：负责干活)
[[queues.consumers]]
queue = "scraping-tasks"
max_batch_size = 5       # 每次最多处理 5 个任务 (防止 CPU 超限)
max_retries = 2          # 失败重试次数

# 5. 绑定 Workers AI
[ai]
binding = "AI"

# 6. 绑定 R2 存储桶 (图片缓存 Demo)
[[r2_buckets]]
binding = "IMG_CACHE"
bucket_name = "tg-image-cache"

# 注意：环境变量建议直接在 Cloudflare Dashboard 中设置
# 如果需要在本地定义变量，取消注释下方的 [vars] 部分并修改值
# [vars]
# SITE_URL = "https://your-domain.pages.dev/"

